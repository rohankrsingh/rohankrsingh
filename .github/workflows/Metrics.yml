name: Update Metrics (stats, languages, activity)

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily at midnight UTC
  workflow_dispatch: {}

concurrency:
  group: metrics
  cancel-in-progress: false

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Stats card (replaces github-readme-stats)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.STATS_TOKEN }}
          committer_token: ${{ secrets.STATS_TOKEN }}
          filename: profile/metrics-stats.svg
          base: "header, activity, community, repositories, metadata"
          config_timezone: Asia/Kolkata

      - name: Top languages card (replaces github-readme-stats top-langs)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.STATS_TOKEN }}
          committer_token: ${{ secrets.STATS_TOKEN }}
          filename: profile/metrics-langs.svg
          base: ""
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_recent_categories: "*"

      - name: Activity card (replaces github-readme-activity-graph)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.STATS_TOKEN }}
          committer_token: ${{ secrets.STATS_TOKEN }}
          filename: profile/metrics-activity.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
