name: Update GitHub Stats Cards

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily at midnight UTC
  workflow_dispatch: {}

concurrency:
  group: stats-cards
  cancel-in-progress: false

jobs:
  update-cards:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          # Uses STATS_TOKEN (a PAT with repo + read:user scopes) so private
          # repo activity is counted. Falls back to the default token if
          # STATS_TOKEN isn't set, but then only public activity shows up.
          options: username=rohankrsingh&show_icons=true&theme=tokyonight&hide_border=true&count_private=true
          path: profile/stats.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=rohankrsingh&layout=compact&theme=tokyonight&hide_border=true
          path: profile/top-langs.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Generate trophy card
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: rohankrsingh
          output_path: profile/trophy.svg
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Commit generated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --staged --quiet || git commit -m "Update GitHub stats cards"
          git pull --rebase --autostash origin main
          git push
